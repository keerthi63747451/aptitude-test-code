<!DOCTYPE html>
<html>
<head>
  <title>Task 1 - Center Box</title>
  <style>
    body { margin: 0; }
    .container {
      height: 100vh; 
      display: flex;
      justify-content: center; /* flex-start, flex-end, space-between try pannu */
      align-items: center;
      background: #f0f0f0;
    }
    .box {
      width: 150px; height: 150px; background: #3498db;
      color: white; display: flex; justify-content: center; align-items: center;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="box">Center</div>
  </div>
</body>
</html>
