<!DOCTYPE html>
<html>
<head>
  <title>Task 3 - Card Row</title>
  <style>
    .card-row {
      display: flex; 
      flex-wrap: wrap; /* Screen sinna aana keela varum */
      gap: 15px; 
      padding: 20px;
    }
    .card {
      width: 200px; height: 150px; background: #e74c3c;
      color: white; border-radius: 8px;
      display: flex; justify-content: center; align-items: center;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <h2>Resize </h2>
  <div class="card-row">
    <div class="card">Card 1</div>
    <div class="card">Card 2</div>
    <div class="card">Card 3</div>
    <div class="card">Card 4</div>
    <div class="card">Card 5</div>
    <div class="card">Card 6</div>
  </div>
</body>
</html>
